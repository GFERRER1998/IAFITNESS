eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:7080/realms/master/protocol/openid-connect/certs

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://USERSERVICE
          predicates:
            - Path=/api/user/**

        - id: activity-service
          uri: lb://ACTIVITYSERVICE
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://AISERVICES
          predicates:
            - Path=/api/recommendations/**

server:
  port: 8080
